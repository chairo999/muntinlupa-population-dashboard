<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MunTHINK Hub — SDG Localization</title>
    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #033492, #0f5ad4);
            color: #fff;
            min-height: 100vh;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 24px;
        }

        .card {
            max-width: 640px;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 2rem;
        }

        p {
            margin: 0 0 20px;
            line-height: 1.6;
            color: #e8f2ff;
        }

        a {
            display: inline-block;
            background: #fbce13;
            color: #033492;
            text-decoration: none;
            font-weight: 700;
            padding: 10px 18px;
            border-radius: 999px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>SDG Localization</h1>
        <p>This sector page is ready for your SDG Localization dashboard content.</p>
        <a href="landing-page.html">Back to landing page</a>
    </div>
</body>
</html>
