<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9-Part Split Navigation Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="landing-page-body">


    <main class="slider-container" id="main-slider">
        
        <section class="slide-part active" id="part1">
            <div class="content-card">
                <h1>ECOLOGICAL PROFILE</h1>
                <h2>MUNTINLUPA CITY</h2>
                <button class="btn-action" onclick="scrollToPart('part2')">Discover Matrix <i class="fa-solid fa-arrow-down"></i></button>
            </div>
        </section>

        <section class="slide-part" id="part2">
            <div class="content-card">
                <h1>POPULATION</h1>
                <button class="btn-action" onclick="scrollToPart('part3')">Proceed Next</button>
            </div>
        </section>

        <section class="slide-part" id="part3">
            <div class="content-card">
                <h1>ECONOMIC</h1>
                <button class="btn-action" onclick="scrollToPart('part4')">View Analytics</button>
            </div>
        </section>

        <section class="slide-part" id="part4">
            <div class="content-card">
                <h1>EDUCATION</h1>
                <button class="btn-action" onclick="scrollToPart('part5')">Explore Cloud</button>
            </div>
        </section>

        <section class="slide-part" id="part5">
            <div class="content-card">
                <h1>HEALTH</h1>
                <button class="btn-action" onclick="scrollToPart('part6')">Check Architecture</button>
            </div>
        </section>

        <section class="slide-part" id="part6">
            <div class="content-card">
                <h1>PROTECTIVE</h1>
                <button class="btn-action" onclick="scrollToPart('part7')">Audit Security</button>
            </div>
        </section>

        <section class="slide-part" id="part7">
            <div class="content-card">
                <h1>SOCIAL WELFARE</h1>
                <button class="btn-action" onclick="scrollToPart('part8')">Test Performance</button>
            </div>
        </section>

        <section class="slide-part" id="part8">
            <div class="content-card">
                <h1>ENVIRONMENT</h1>
                <button class="btn-action" onclick="scrollToPart('part9')">Finalize Deploy</button>
            </div>
        </section>

        <section class="slide-part" id="part9">
            <div class="content-card">
                <h1>INSTITUTIONAL</h1>
                <button class="btn-action" onclick="scrollToPart('part1')"><i class="fa-solid fa-arrow-up-long"></i> Back To Top</button>
            </div>
        </section>

    </main>

    <script>
        const slider = document.getElementById('main-slider');
        const sections = document.querySelectorAll('.slide-part');
        const dots = document.querySelectorAll('.nav-dot');

        // Scroll navigation mapping function
        function scrollToPart(id) {
            const element = document.getElementById(id);
            if(element) {
                element.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Attach click actions dynamically to navigation bar dots
        dots.forEach(dot => {
            dot.addEventListener('click', () => {
                const targetId = dot.getAttribute('data-target');
                scrollToPart(targetId);
            });
        });

        // Intersection Observer logic to highlight active indicator dots and run transition animations
        const observerOptions = {
            root: slider,
            threshold: 0.5 // Section must occupy at least 50% screen real-estate to activate
        };

        const sectionObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    // Update active section states
                    sections.forEach(s => s.classList.remove('active'));
                    entry.target.classList.add('active');

                    // Sync corresponding navigation side-bar element
                    const sectionId = entry.target.getAttribute('id');
                    dots.forEach(dot => {
                        if(dot.getAttribute('data-target') === sectionId) {
                            dot.classList.add('active');
                        } else {
                            dot.classList.remove('active');
                        }
                    });
                }
            });
        }, observerOptions);

        // Bind sections array to observer pipeline
        sections.forEach(section => sectionObserver.observe(section));
    </script>
</body>
</html>
